name: run_tests

on:
  pull_request:
  push:
    branches: [main]


# Cancels all previous workflow runs for pull requests that have not completed.
concurrency:
  # The concurrency group contains the workflow name and the branch name for pull requests
  # or the commit hash for any other events.
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
  cancel-in-progress: true


jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - subset-name: "Steady State Tests"
            os: ubuntu-latest
            python-version: "3.12"
            test-subset: "tests/model/test_steady_state.py tests/model/test_model.py::test_steady_state"
            test-marker: ""

          - subset-name: "Numerical Steady State Tests"
            os: ubuntu-latest
            python-version: "3.12"
            test-subset: "tests/model/test_model.py::test_numerical_steady_state tests/model/test_model.py::test_numerical_steady_state_with_calibrated_params tests/model/test_model.py::test_partially_analytical_steady_state"
            test-marker: ""

          - subset-name: "Perturbation and Statespace Tests"
            os: ubuntu-latest
            python-version: "3.12"
            test-subset: "tests/model/test_perturbation.py tests/model/test_statespace.py"
            test-marker: ""

          - subset-name: "Other Model Tests"
            os: ubuntu-latest
            python-version: "3.12"
            test-subset: "tests/model --ignore=tests/model/test_steady_state.py --ignore=tests/model/test_statespace.py --ignore=tests/model/test_perturbation.py --deselect tests/model/test_model.py::test_numerical_steady_state --deselect tests/model/test_model.py::test_numerical_steady_state_with_calibrated_params --deselect tests/model/test_model.py::test_partially_analytical_steady_state"
            test-marker: ""

          - subset-name: "Other Tests"
            os: ubuntu-latest
            python-version: "3.12"
            test-subset: "tests/ --ignore=tests/model"
            test-marker: ""

          # Windows is a smoke test, not a correctness sweep: model/solver correctness is
          # OS-independent and covered exhaustively by the Ubuntu jobs above. The Windows jobs
          # below exercise only the OS-sensitive machinery — pytensor's compile toolchain,
          # .gcn file loading, multiprocessing — across the core solve/linearize/simulate
          # pipeline. Pure-algebra suites (parser grammar, block FOCs, plotting, classes) and
          # the steady-state / statespace / build files run on Ubuntu only. The
          # test_*_backends_agree and steady-state deselects stay because Windows BLAS
          # produces slightly different numbers, not because the tests are uninteresting.
          - subset-name: "Windows Model Integration"
            os: windows-latest
            python-version: "3.13"
            test-subset: "tests/model/test_model.py --deselect tests/model/test_model.py::test_steady_state --deselect tests/model/test_model.py::test_numerical_steady_state --deselect tests/model/test_model.py::test_partially_analytical_steady_state --deselect tests/model/test_model.py::test_all_backends_agree_on_functions --deselect tests/model/test_model.py::test_scipy_wrapped_functions_agree --deselect tests/model/test_model.py::test_all_backends_agree_on_parameters"
            test-marker: "not include_nk"

          - subset-name: "Windows Model Solve & Diagnostics"
            os: windows-latest
            python-version: "3.13"
            test-subset: "tests/model/test_compile.py tests/model/test_perturbation.py tests/model/test_diagnostics.py tests/model/perfect_foresight"
            test-marker: "not include_nk"

          - subset-name: "Windows Core Library"
            os: windows-latest
            python-version: "3.13"
            test-subset: "tests/pytensorf tests/solvers tests/parser/test_loader.py tests/test_dynare_convert.py"
            test-marker: "not include_nk"

    name: ${{ matrix.subset-name }} (${{ matrix.os }} Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}

    env:
      TEST_SUBSET: ${{ matrix.test-subset }}
      TEST_MARKER: ${{ matrix.test-marker }}

    defaults:
      run:
        shell: bash -leo pipefail {0}

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476 # v3.0.0

      with:
        environment-file: conda_envs/geconpy_test.yml
        micromamba-version: "2.6.0-0"
        create-args: >-
          python=${{matrix.python-version}}
        environment-name: geconpy-test
        init-shell: bash
        cache-environment: true

    - name: Install current branch
      run: |
        pip install -e .
        python --version
        pip check

    - name: Create matrix id
      id: matrix-id
      env:
        MATRIX_CONTEXT: ${{ toJson(matrix) }}
      run: |
        echo $MATRIX_CONTEXT
        export MATRIX_ID=`echo $MATRIX_CONTEXT | sha256sum | cut -c 1-32`
        echo $MATRIX_ID
        echo "id=$MATRIX_ID" >> $GITHUB_OUTPUT

    # Persist pytensor's compiled-function cache across runs. pytensor content-hashes
    # each module and invalidates on its side, so a stale entry just misses and
    # recompiles. The run-id suffix + restore-keys prefix make the cache roll forward.
    - name: Cache pytensor compiledir
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.pytensor
        key: pytensor-${{ steps.matrix-id.outputs.id }}-${{ github.run_id }}
        restore-keys: |
          pytensor-${{ steps.matrix-id.outputs.id }}-

    - name: Run tests
      run: |
        python -m pytest -vv --cache-clear --cov=gEconpy --cov-report=xml:coverage/coverage-${MATRIX_ID}.xml --no-cov-on-fail --cov-report term $TEST_SUBSET -m "$TEST_MARKER" --durations=50 --benchmark-disable
      env:
        MATRIX_ID: ${{ steps.matrix-id.outputs.id }}

    - name: Upload coverage file
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: coverage-${{ steps.matrix-id.outputs.id }}
        path: coverage/coverage-${{ steps.matrix-id.outputs.id }}.xml


  all-checks:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    name: "All tests"
    needs: [test]
    steps:
      - name: Check build matrix status
        if: ${{ needs.test.result != 'success' }}
        run: exit 1

  upload-coverage:
    runs-on: ubuntu-latest
    name: "Upload coverage"
    needs: [all-checks]
    if: ${{ needs.all-checks.result == 'success' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install -U coverage>=5.1 coveralls

      - name: Download coverage file
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: coverage-*
          path: coverage
          merge-multiple: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          directory: ./coverage/
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
