name: geconpy-test
channels:
- conda-forge
- nodefaults
dependencies:
  # Base dependencies
  - numpy
  - numba
  - scipy
  - sympy>=1.14.0
  - pyparsing
  - pandas
  - xarray
  - matplotlib
  - arviz>=1.1.0
  - statsmodels
  - pymc>=6.0.1
  - pytensor>=3.0.4
  - preliz>=0.25.0
  - ipython
  - sympytensor>=2.0.1
  - pymc-extras>=0.12.0
  - better-optimize>=0.4.2
  - nutpie>=0.16.10
  - networkx

  # Testing dependencies
  - pre-commit
  - pytest-cov>=7.1.0
  - pytest>=9.0.3
  - pytest-env
  - pytest-benchmark

  - pip
  - pip:
      - numdifftools
      - jax
      - asv
