name: geconpy-test
channels:
- conda-forge
- nodefaults
dependencies:
  # Base dependencies
  - numpy
  - numba
  - scipy
  - sympy>=1.14.0
  - pyparsing
  - pandas
  - xarray
  - matplotlib
  - arviz<1.0
  - statsmodels
  - pymc>=6.0.0
  - pytensor>=3.0.0
  - preliz>=0.23.0
  - ipython
  - sympytensor>=2.0.0
  - pymc-extras>=0.11.0
  - better-optimize>=0.2.1
  - nutpie
  - networkx

  # Testing dependencies
  - pre-commit
  - pytest-cov>=2.5
  - pytest>=3.0
  - pytest-env
  - pytest-benchmark

  - pip
  - pip:
      - numdifftools
      - jax
      - asv
