name: geconpy-dev
channels:
  - conda-forge
  - nvidia
  - nodefaults

dependencies:
  # Core dependencies
  - python=3.12
  - pymc>=5.27.1
  - pytensor>=2.37.0
  - matplotlib
  - numba
  - numpy
  - pandas
  - pyparsing
  - preliz>=0.23.0
  - scipy
  - setuptools
  - statsmodels
  - sympy>=1.14.0
  - pip
  - ipython
  - notebook<7
  - nutpie
  - networkx
  - sympytensor>=1.4.1
  - pymc-extras>=0.8.0

  # For building docs
  - ipython
  - jupyter-sphinx
  - myst-nb
  - numpydoc
  - pre-commit
  - sphinx>=5
  - sphinx-copybutton
  - sphinx-design
  - sphinx-notfound-page
  - sphinx-sitemap
  - sphinx-codeautolink
  - sphinxcontrib-bibtex
  - pydata-sphinx-theme
  - watermark
  - better-optimize>=0.2.1

  # developer tools
  - pre-commit
  - pytest
  - pytest-env
  - pytest-cov
  - pytest-benchmark
  - pandas-datareader

  - pip:
      - numdifftools
      - jax>0.8,<0.9.1
      - flowjax
      - corner
      - asv
      - -e ../.
      - pymc @ git+https://github.com/pymc-devs/pymc.git@v6
      - pytensor @ git+https://github.com/pymc-devs/pytensor.git@v3
      - preliz @ git+https://github.com/arviz-devs/preliz.git@main
      - pymc-extras @ git+https://github.com/jessegrabowski/pymc-extras.git@v0.11
      - sympytensor @ git+https://github.com/jessegrabowski/sympytensor.git@v1.5
