name: geconpy-dev
channels:
  - conda-forge
  - nvidia
  - nodefaults

dependencies:
  # Core dependencies
  - python=3.13
  - pymc>=6.0.1
  - pytensor>=3.0.4
  - matplotlib
  - numba
  - numpy
  - pandas
  - pyparsing
  - preliz>=0.25.0
  - scipy
  - setuptools
  - statsmodels
  - sympy>=1.14.0
  - pip
  - ipython
  - notebook<7
  - nutpie>=0.16.10
  - networkx
  - sympytensor>=2.0.1
  - pymc-extras>=0.12.0

  # For building docs
  - ipython
  - jupyter-sphinx
  - myst-nb
  - numpydoc
  - pre-commit
  - sphinx>=9.1.0
  - sphinx-copybutton
  - sphinx-design
  - sphinx-notfound-page
  - sphinx-sitemap
  - sphinx-codeautolink
  - sphinxcontrib-bibtex
  - pydata-sphinx-theme
  - watermark
  - better-optimize>=0.4.2

  # developer tools
  - pre-commit
  - pytest
  - pytest-env
  - pytest-cov
  - pytest-benchmark
  - pandas-datareader

  - pip:
      - numdifftools
      - jax>=0.10.1
      - flowjax
      - corner
      - asv
      - -e ../.
